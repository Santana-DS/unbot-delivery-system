; =============================================================================
; platformio.ini
;
; UnBot Delivery — ESP32 Firmware Build Configuration
; -----------------------------------------------------------------------------
; BOARD:
;   esp32dev covers the most common 38-pin ESP32-WROOM-32 devkit.
;   If your board is different (ESP32-S3, ESP32-C3, TTGO, etc.), change
;   `board` and `board_build.mcu` accordingly. All other settings apply.
;
; SERIAL MONITOR:
;   `make run` or the PlatformIO serial monitor button connects at 115200 baud.
;   Set your terminal to the same rate or all output will be garbage.
;
; LIBRARY VERSIONS:
;   Pinned to minor versions (^x.y) to allow patch updates but prevent
;   breaking API changes. Re-pin after verifying compatibility if you upgrade.
; =============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial monitor ────────────────────────────────────────────────────────────
monitor_speed = 115200

; ── Upload speed (reduce to 115200 if you see CRC errors on your cable) ──────
upload_speed = 921600

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    ; Enable the ESP32 Arduino log macros (ESP_LOG*).
    ; Set to CORE_DEBUG_LEVEL=0 in production to suppress all debug output
    ; and reduce firmware size.
    -DCORE_DEBUG_LEVEL=1

    ; ArduinoJson: use the JsonDocument API (v7 style).
    ; Remove this flag if you pin to ArduinoJson v6 (uses StaticJsonDocument).
    -DARDUINOJSON_ENABLE_COMMENTS=0

    ; Partition scheme: default (1.2MB app, 1.5MB SPIFFS).
    ; If your firmware exceeds 1.2MB after adding ROS serial bridge, switch to
    ; `board_build.partitions = huge_app.csv` (3MB app, no OTA).

; ── Library dependencies ──────────────────────────────────────────────────────
lib_deps =
    ; MQTT client. 2.8.0 is the last stable release with ESP32 keep-alive fixes.
    knolleary/PubSubClient @ ^2.8

    ; JSON serialisation / deserialisation. v7 uses JsonDocument (no size template).
    ; If you need v6 compatibility: bblanchon/ArduinoJson @ ^6.21
    bblanchon/ArduinoJson @ ^7.0
    ; =============================================================================
    ; platformio.ini
    ;
    ; UnBot Delivery — ESP32 Firmware v3.0 (OLED + QR Code)
    ; -----------------------------------------------------------------------------
    ; CHANGES FROM v2.1:
    ;   + ricmoo/QRCode         — stack-only QR matrix generation, zero heap alloc
    ;   + Adafruit SSD1306      — I2C OLED driver (128×64), 1KB framebuffer
    ;   + Adafruit GFX Library  — pixel/text drawing primitives
    ;
    ; PARTITION NOTE:
    ;   Default partition gives 1.2MB app space. Our firmware with Adafruit GFX
    ;   compiles to ~650KB — no partition change needed. Monitor with:
    ;     pio run -e esp32dev -t size
    ; =============================================================================
    ricmoo/QRCode           @ ^0.0.1
    adafruit/Adafruit SSD1306    @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

; ── Partition scheme ──────────────────────────────────────────────────────────
; Uncomment if firmware + SPIFFS exceeds the default 1.2MB app partition.
; board_build.partitions = min_spiffs.csv
